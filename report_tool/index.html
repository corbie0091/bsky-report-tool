<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>상권 보고 자동 생성기</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
max-width:800px;
margin:auto;
padding:15px;
background:#f4f4f4;
}

.section{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}

.row{
display:flex;
justify-content:space-between;
margin-bottom:6px;
}

input{
width:80px;
padding:6px;
}

textarea{
width:100%;
height:350px;
margin-top:10px;
}

button{
width:100%;
padding:10px;
margin-top:8px;
}

.worker{
border-top:1px solid #ddd;
padding-top:10px;
margin-top:10px;
}

canvas{
margin-top:20px;
background:white;
padding:10px;
border-radius:10px;
}

</style>

</head>

<body>

<h2>상권 보고 생성기</h2>

<div class="section">

<div class="row">

상권

<select id="area">

<option>공구상가</option>
<option>전포동</option>
<option>영광도서</option>
<option>당감</option>
<option>양정</option>
<option>개금</option>
<option>동서대/주례</option>
<option>조방</option>
<option>초량</option>
<option>동아대</option>
<option>하단오거리</option>
<option>라브랜드</option>
<option>씨파크</option>
<option>장림</option>
<option>괴정</option>
<option>강서구</option>
<option>신호동</option>
<option>삼익</option>
<option>부평</option>
<option>신동아</option>
<option>자갈치</option>
<option>자갈치 반쪽</option>
<option>꼼장어/양곱창</option>
<option>자갈마당</option>
<option>영도 남항동</option>
<option>영도 동삼동</option>
<option>사상</option>
<option>감전동</option>
<option>덕포/모라</option>
<option>덕천</option>
<option>만덕</option>
<option>구포</option>
<option>화명</option>
<option>방통대</option>

</select>

</div>

<div class="row">총 방문업소 <input id="shop"></div>

</div>

<div class="section">

<h3>점유비 입력</h3>

<div class="row">좋은데이 <input id="goodday"></div>
<div class="row">톡시리즈 <input id="tok"></div>
<div class="row">부산갈매기 <input id="galmegi"></div>
<div class="row">기타 <input id="etc1"></div>

<div class="row">참이슬 <input id="chamisul"></div>
<div class="row">진로 <input id="jinro"></div>
<div class="row">기타 <input id="etc2"></div>

<div class="row">대선 <input id="daesun"></div>
<div class="row">부산 <input id="busan"></div>
<div class="row">기타 <input id="etc3"></div>

<div class="row">새로 <input id="saero"></div>
<div class="row">청하 <input id="cheongha"></div>
<div class="row">기타 <input id="etc4"></div>

<div class="row">기타주류회사 <input id="etcCompany"></div>

</div>

<div class="section">

<h3>근무자 추가</h3>

<input id="workerName" placeholder="이름 입력">

<button onclick="addWorker()">근무자 추가</button>

<div id="workers"></div>

</div>

<button onclick="generate()">보고서 생성</button>

<button onclick="copyText()">보고서 복사</button>

<button onclick="copyChart()">그래프 복사</button>

<textarea id="result"></textarea>

<canvas id="chart" width="400" height="400"></canvas>

<script>

let workers=[]
let chart

function getToday(){

let d=new Date()

let m=String(d.getMonth()+1).padStart(2,'0')
let day=String(d.getDate()).padStart(2,'0')

let week=["일","월","화","수","목","금","토"]

return `${m}월 ${day}일(${week[d.getDay()]})`

}

function addWorker(){

let name=document.getElementById("workerName").value

if(!name)return

workers.push(name)

let html=`

<div class="worker">

<b>${name}</b>

<div class="row">전환 좋은데이 <input id="conv_good_${name}"></div>
<div class="row">전환 갈매기 <input id="conv_gal_${name}"></div>
<div class="row">전환 톡톡 <input id="conv_tok_${name}"></div>

<div class="row">추가주문 좋은데이 <input id="add_good_${name}"></div>
<div class="row">추가주문 갈매기 <input id="add_gal_${name}"></div>
<div class="row">추가주문 톡톡 <input id="add_tok_${name}"></div>

</div>
`

document.getElementById("workers").insertAdjacentHTML("beforeend",html)

document.getElementById("workerName").value=""

}

function val(id){

return Number(document.getElementById(id)?.value)||0

}

function percent(v,total){

if(total==0)return "0.0%"

return ((v/total)*100).toFixed(1)+"%"

}

function generate(){

let date=getToday()

let area=document.getElementById("area").value
let shop=val("shop")

let goodday=val("goodday")
let tok=val("tok")
let galmegi=val("galmegi")
let etc1=val("etc1")

let chamisul=val("chamisul")
let jinro=val("jinro")
let etc2=val("etc2")

let daesun=val("daesun")
let busan=val("busan")
let etc3=val("etc3")

let saero=val("saero")
let cheongha=val("cheongha")
let etc4=val("etc4")

let etcCompany=val("etcCompany")

let total=
goodday+tok+galmegi+etc1+
chamisul+jinro+etc2+
daesun+busan+etc3+
saero+cheongha+etc4+
etcCompany

let muhak=goodday+tok+galmegi+etc1
let hite=chamisul+jinro+etc2
let daesunSum=daesun+busan+etc3
let lotte=saero+cheongha+etc4

let totalGood=0
let totalGal=0
let totalTok=0

let addGood=0
let addGal=0
let addTok=0

let sellText=""
let convText=""
let addText=""

workers.forEach(name=>{

let cg=val(`conv_good_${name}`)
let cga=val(`conv_gal_${name}`)
let ct=val(`conv_tok_${name}`)

let ag=val(`add_good_${name}`)
let aga=val(`add_gal_${name}`)
let at=val(`add_tok_${name}`)

let sell=cga+aga

sellText+=`${name} : ${sell}본\n`

convText+=`${name}: ${cg}t(좋은데이) / ${cga}t(부산갈매기) / ${ct}t(톡톡)\n`
addText+=`${name}: ${ag}t(좋은데이) / ${aga}t(부산갈매기) / ${at}t(톡톡)\n`

totalGood+=cg
totalGal+=cga
totalTok+=ct

addGood+=ag
addGal+=aga
addTok+=at

})

let text=

`< ${date} ${area} 상권 보고 >

1. 점유비
- 총 방문업소: ${shop}개
- 총 테이블 수: ${total}T

가. 무학: ${muhak}T (${percent(muhak,total)})
나. 하이트진로: ${hite}T (${percent(hite,total)})
다. 대선주조: ${daesunSum}T (${percent(daesunSum,total)})
라. 롯데: ${lotte}T (${percent(lotte,total)})
마. 기타: ${etcCompany}T (${percent(etcCompany,total)})

2. 전환 및 추가주문

부산 갈매기 총 판매 병 수
${sellText}

총 전환: ${totalGood}t / ${totalGal}t / ${totalTok}t
${convText}

총 추가주문: ${addGood}t / ${addGal}t / ${addTok}t
${addText}
`

document.getElementById("result").value=text

drawChart(muhak,hite,daesunSum,lotte,etcCompany)

}

function drawChart(muhak,hite,daesun,lotte,etc){

let ctx=document.getElementById("chart")

if(chart) chart.destroy()

chart=new Chart(ctx,{

type:"pie",

data:{

labels:["무학","하이트","대선","롯데","기타"],

datasets:[{

data:[muhak,hite,daesun,lotte,etc]

}]

}

})

}

function copyText(){

let text=document.getElementById("result")

navigator.clipboard.writeText(text.value)

alert("보고서 복사 완료")

}

function copyChart(){

let canvas=document.getElementById("chart")

canvas.toBlob(blob=>{

let item=new ClipboardItem({"image/png":blob})

navigator.clipboard.write([item])

})

alert("그래프 복사 완료")

}

</script>

</body>

</html>
