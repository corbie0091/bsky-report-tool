<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>상권 음용비율 분석</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

<style>

body{
font-family: Arial;
background:#f4f4f4;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

h2{
text-align:center;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
font-size:16px;
}

button{
width:100%;
padding:12px;
font-size:16px;
background:#444;
color:white;
border:none;
border-radius:6px;
margin-top:10px;
}

canvas{
margin-top:20px;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
border-bottom:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#eee;
}

.total{
font-weight:bold;
}

.info{
text-align:center;
margin-top:15px;
font-size:18px;
}

</style>
</head>

<body>

<div class="container">

<h2 id="title"></h2>

<select id="area">
<option>공구상가</option>
<option>롯데후문</option>
<option>영광도서</option>
<option>삼익</option>
<option>부산대</option>
<option>서면</option>
</select>

<input type="number" id="store" placeholder="총 방문 업소 수">

<h3>음용 테이블 입력</h3>

<input type="number" id="muhak" placeholder="무학">
<input type="number" id="hite" placeholder="하이트진로">
<input type="number" id="lotte" placeholder="롯데">
<input type="number" id="daesun" placeholder="대선">
<input type="number" id="etc" placeholder="기타">

<button onclick="generate()">그래프 생성</button>

<canvas id="chart"></canvas>

<div class="info" id="storeText"></div>

<table id="table">
<thead>
<tr>
<th>업체</th>
<th>음용테이블</th>
<th>전체 비율</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>

let chart;

function generate(){

let today = new Date().toISOString().slice(0,10)

let area = document.getElementById("area").value
let store = document.getElementById("store").value

document.getElementById("title").innerText =
today + "\n남부산지점 - " + area

document.getElementById("storeText").innerText =
"총 방문 업소 수 : " + store

let muhak = Number(document.getElementById("muhak").value)
let hite = Number(document.getElementById("hite").value)
let lotte = Number(document.getElementById("lotte").value)
let daesun = Number(document.getElementById("daesun").value)
let etc = Number(document.getElementById("etc").value)

let data = [muhak,hite,lotte,daesun,etc]

let total = data.reduce((a,b)=>a+b,0)

let ctx = document.getElementById("chart")

if(chart) chart.destroy()

chart = new Chart(ctx,{

type:"pie",

data:{
labels:["무학","하이트진로","롯데","대선","기타"],
datasets:[{
data:data,
backgroundColor:[
"#3b6edc",
"#e74c3c",
"#f39c12",
"#27ae60",
"#9b59b6"
]
}]
},

plugins:[ChartDataLabels],

options:{
plugins:{
legend:{position:"right"},
datalabels:{
color:"#fff",
font:{weight:"bold",size:16},
formatter:(value)=>{
if(total==0) return ""
let p=(value/total*100).toFixed(1)
return p+"%"
}
}
}
}

})

let companies=["무학","하이트진로","롯데","대선","기타"]

let tbody=document.querySelector("#table tbody")

tbody.innerHTML=""

companies.forEach((c,i)=>{

let percent=total==0?0:(data[i]/total*100).toFixed(1)

tbody.innerHTML+=`
<tr>
<td>${c}</td>
<td>${data[i]}</td>
<td>${percent}%</td>
</tr>
`

})

tbody.innerHTML+=`
<tr class="total">
<td>합계</td>
<td>${total}</td>
<td></td>
</tr>
`

}

</script>

</body>
</html>
