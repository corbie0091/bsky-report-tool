<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>상권 보고 자동 생성기</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>

<style>

body{
font-family:Arial;
max-width:900px;
margin:auto;
padding:20px;
background:#f4f4f4;
}

.section{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}

.row{
display:flex;
justify-content:space-between;
margin-bottom:6px;
}

input,select{
padding:6px;
}

textarea{
width:100%;
height:320px;
margin-top:10px;
}

button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
background:#444;
color:white;
border-radius:6px;
}

.worker{
border-top:1px solid #ddd;
padding-top:10px;
margin-top:10px;
}

canvas{
margin-top:20px;
background:white;
padding:10px;
border-radius:10px;
}

h3{
margin-top:0;
}

.reportBox{
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
}

.reportTitle{
text-align:center;
font-weight:bold;
font-size:18px;
margin-bottom:10px;
}

.info{
text-align:center;
margin-top:10px;
font-size:16px;
}

table{
width:100%;
margin-top:15px;
border-collapse:collapse;
}

th,td{
border-bottom:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#eee;
}

</style>

</head>

<body>

<h2>상권 보고 자동 생성기</h2>

<div class="section">

<div class="row">

상권

<select id="area">

<option>공구상가</option>
<option>롯데후문</option>
<option>영광도서</option>
<option>서면1번가</option>
<option>전포</option>
<option>경성대</option>
<option>남포동</option>
<option>광복동</option>
<option>동래</option>
<option>온천장</option>
<option>연산동</option>
<option>광안리</option>
<option>해운대</option>
<option>센텀</option>
<option>덕천</option>
<option>화명</option>

</select>

</div>

<div class="row">
총 방문업소
<input id="shop">
</div>

</div>


<div class="section">

<h3>점유비 입력</h3>

<div class="row">좋은데이 <input id="goodday"></div>
<div class="row">톡시리즈 <input id="tok"></div>
<div class="row">부산갈매기 <input id="galmegi"></div>
<div class="row">기타 <input id="etc1"></div>

<div class="row">참이슬 <input id="chamisul"></div>
<div class="row">진로 <input id="jinro"></div>
<div class="row">기타 <input id="etc2"></div>

<div class="row">대선 <input id="daesun"></div>
<div class="row">부산 <input id="busan"></div>
<div class="row">기타 <input id="etc3"></div>

<div class="row">새로 <input id="saero"></div>
<div class="row">청하 <input id="cheongha"></div>
<div class="row">기타 <input id="etc4"></div>

<div class="row">기타주류회사 <input id="etcCompany"></div>

</div>


<div class="section">

<h3>근무자 추가</h3>

<input id="workerName" placeholder="이름 입력">

<button onclick="addWorker()">근무자 추가</button>

<div id="workers"></div>

</div>


<button onclick="generateReport()">보고서 생성</button>
<button onclick="copyText()">보고서 복사</button>

<textarea id="result"></textarea>



<div id="reportArea" style="display:none">

<div class="reportBox">

<div class="reportTitle" id="reportTitle"></div>

<canvas id="reportChart"></canvas>

<div class="info" id="reportShop"></div>

<table id="reportTable">

<thead>

<tr>
<th>업체</th>
<th>음용테이블</th>
<th>전체 비율</th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>

</div>


<script>

let workers=[]
let mainChart
let reportChart

function getToday(){

let d=new Date()

let m=String(d.getMonth()+1).padStart(2,'0')
let day=String(d.getDate()).padStart(2,'0')

let week=["일","월","화","수","목","금","토"]

return `${m}월 ${day}일(${week[d.getDay()]})`

}

function addWorker(){

let name=document.getElementById("workerName").value
if(!name)return

workers.push(name)

let html=`

<div class="worker">

<b>${name}</b>

<div class="row">전환 좋은데이 <input id="conv_good_${name}"></div>
<div class="row">전환 갈매기 <input id="conv_gal_${name}"></div>
<div class="row">전환 톡톡 <input id="conv_tok_${name}"></div>

<div class="row">추가주문 좋은데이 <input id="add_good_${name}"></div>
<div class="row">추가주문 갈매기 <input id="add_gal_${name}"></div>
<div class="row">추가주문 톡톡 <input id="add_tok_${name}"></div>

</div>
`

document.getElementById("workers").insertAdjacentHTML("beforeend",html)
document.getElementById("workerName").value=""

}

function val(id){
return Number(document.getElementById(id)?.value)||0
}

function percent(v,total){
if(total==0)return "0%"
return ((v/total)*100).toFixed(1)+"%"
}

function generateReport(){

let date=getToday()
let area=document.getElementById("area").value
let shop=val("shop")

let goodday=val("goodday")
let tok=val("tok")
let galmegi=val("galmegi")
let etc1=val("etc1")

let chamisul=val("chamisul")
let jinro=val("jinro")
let etc2=val("etc2")

let daesun=val("daesun")
let busan=val("busan")
let etc3=val("etc3")

let saero=val("saero")
let cheongha=val("cheongha")
let etc4=val("etc4")

let etcCompany=val("etcCompany")

let muhak=goodday+tok+galmegi+etc1
let hite=chamisul+jinro+etc2
let daesunSum=daesun+busan+etc3
let lotte=saero+cheongha+etc4

let total=muhak+hite+daesunSum+lotte+etcCompany


let text=
`< ${date} ${area} 상권 보고 >

1. 점유비
- 총 방문업소: ${shop}개
- 총 테이블 수: ${total}T

가. 무학: ${muhak}T (${percent(muhak,total)})
- 좋은데이: ${goodday}T (${percent(goodday,total)})
- 톡시리즈: ${tok}T (${percent(tok,total)})
- 부산갈매기: ${galmegi}T (${percent(galmegi,total)})
- 기타: ${etc1}T (${percent(etc1,total)})

나. 하이트진로: ${hite}T (${percent(hite,total)})
- 참이슬: ${chamisul}T (${percent(chamisul,total)})
- 진로: ${jinro}T (${percent(jinro,total)})
- 기타: ${etc2}T (${percent(etc2,total)})

다. 대선주조: ${daesunSum}T (${percent(daesunSum,total)})
- 대선(C1 포함): ${daesun}T (${percent(daesun,total)})
- 부산: ${busan}T (${percent(busan,total)})
- 기타: ${etc3}T (${percent(etc3,total)})

라. 롯데: ${lotte}T (${percent(lotte,total)})
- 새로: ${saero}T (${percent(saero,total)})
- 청하: ${cheongha}T (${percent(cheongha,total)})
- 기타: ${etc4}T (${percent(etc4,total)})

마. 기타 주류회사: ${etcCompany}T (${percent(etcCompany,total)})
`

document.getElementById("result").value=text


drawReportChart(muhak,hite,daesunSum,lotte,etcCompany,total,shop,area)

}





function drawReportChart(m,h,d,l,e,total,shop,area){

document.getElementById("reportArea").style.display="block"

document.getElementById("reportTitle").innerText=
getToday()+" 남부산지점 - "+area

document.getElementById("reportShop").innerText=
"총 방문 업소 수 : "+shop


let ctx=document.getElementById("reportChart")

if(reportChart)reportChart.destroy()

reportChart=new Chart(ctx,{

type:"pie",

data:{

labels:["무학","하이트진로","대선","롯데","기타"],

datasets:[{

data:[m,h,d,l,e],

backgroundColor:[
"#3b6edc",
"#e74c3c",
"#27ae60",
"#f39c12",
"#9b59b6"
]

}]

},

plugins:[ChartDataLabels],

options:{

plugins:{

legend:{position:"right"},

datalabels:{

color:"#fff",

font:{weight:"bold",size:16},

formatter:(v)=>{

if(total==0) return ""

let p = (v/total)*100

if(p < 10) return ""

return p.toFixed(1) + "%"

}

}

}

}

})


let companies=["무학","하이트진로","대선","롯데","기타"]
let data=[m,h,d,l,e]

let tbody=document.querySelector("#reportTable tbody")
tbody.innerHTML=""

companies.forEach((c,i)=>{

tbody.innerHTML+=`
<tr>
<td>${c}</td>
<td>${data[i]}</td>
<td>${percent(data[i],total)}</td>
</tr>
`

})

}


function copyText(){

let text=document.getElementById("result")

navigator.clipboard.writeText(text.value)

alert("보고서 복사 완료")

}

</script>

</body>

</html>
